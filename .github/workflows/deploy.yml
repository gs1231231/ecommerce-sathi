name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce_sathi_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-that-is-32-chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-that-is-32-chars-long

      - name: Build Docker images
        run: |
          docker build -f apps/api/Dockerfile -t ecommerce-sathi-api:${{ github.sha }} .
          docker build -f apps/web/Dockerfile -t ecommerce-sathi-web:${{ github.sha }} .

      # Add deployment steps here (ECR push, ECS update, etc.)

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
      # Production deployment with manual approval via GitHub environment protection rules
      - run: echo "Production deployment would happen here"
